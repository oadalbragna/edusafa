version: '3.8'

services:
  # Main application with Telegram proxy
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edusafa-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      
      # Firebase Configuration
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_DATABASE_URL=${VITE_FIREBASE_DATABASE_URL}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
      
      # Telegram Proxy Configuration
      - VITE_TELEGRAM_BOT_TOKEN=${VITE_TELEGRAM_BOT_TOKEN}
      - VITE_TELEGRAM_CHAT_ID=${VITE_TELEGRAM_CHAT_ID}
      
      # Proxy Settings
      - PROXY_CACHE_TTL=${PROXY_CACHE_TTL:-600}
      - PROXY_MAX_RETRIES=${PROXY_MAX_RETRIES:-3}
      - PROXY_RATE_LIMIT_WINDOW=${PROXY_RATE_LIMIT_WINDOW:-60000}
      - PROXY_RATE_LIMIT_MAX_REQUESTS=${PROXY_RATE_LIMIT_MAX_REQUESTS:-30}
      - PROXY_LOG_LEVEL=${PROXY_LOG_LEVEL:-warn}
      
      # App Settings
      - VITE_APP_ENV=${VITE_APP_ENV:-production}
      - VITE_APP_BASE_URL=${VITE_APP_BASE_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - edusafa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edusafa-network:
    driver: bridge
